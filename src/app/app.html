<div class="arg-shell d-flex flex-column" [class.vh-100]="!isPublic()">
  @if (isPublic()) {
    <app-navbar />
  } @else {
    <app-topbar />
  }

  <main class="flex-grow-1" [class.overflow-hidden]="!isPublic()">
    <router-outlet />
  </main>
</div>

<!-- Chat flotante -->
<button class="arg-chat-fab" type="button" aria-label="Abrir chat de soporte">
  <i class="bi bi-chat-square-text"></i>
</button>
