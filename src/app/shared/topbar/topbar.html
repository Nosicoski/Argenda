<!-- Banner promocional -->
<div class="arg-banner text-center">
  ARGENDA es 100% gratis — turnos y recordatorios ilimitados, sin tarjeta.
</div>

<!-- Barra de navegación principal -->
<header class="arg-navbar d-flex align-items-center gap-4 px-4">
  <a class="arg-logo d-flex align-items-center justify-content-center" href="#" aria-label="ARGENDA">
    <svg viewBox="0 0 48 48" width="30" height="30" fill="none" aria-hidden="true">
      <rect x="8" y="12" width="32" height="26" rx="4" stroke="#16302f" stroke-width="4" />
      <line x1="16" y1="8" x2="16" y2="16" stroke="#34817e" stroke-width="4" stroke-linecap="round" />
      <line x1="32" y1="8" x2="32" y2="16" stroke="#34817e" stroke-width="4" stroke-linecap="round" />
      <path d="M17 27l6 6 10-11" stroke="#34817e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </svg>
  </a>

  <nav class="d-flex align-items-center gap-4 flex-grow-1">
    @for (item of navItems; track item.label) {
      <a class="arg-nav-link" [class.active]="item.active" href="#">{{ item.label }}</a>
    }
  </nav>

  <div class="d-flex align-items-center gap-3">
    <button class="arg-icon-btn" type="button" aria-label="Buscar">
      <i class="bi bi-search"></i>
    </button>
    <button class="arg-icon-btn position-relative" type="button" aria-label="Notificaciones">
      <i class="bi bi-bell"></i>
      <span class="arg-badge">5</span>
    </button>
    <button class="btn btn-arg-primary arg-reservas-btn" type="button">Reservas Online</button>
    <button class="arg-icon-btn" type="button" aria-label="Configuración">
      <i class="bi bi-gear"></i>
    </button>
    <span class="arg-avatar" role="img" aria-label="Juan Nosicoski">JN</span>
  </div>
</header>
