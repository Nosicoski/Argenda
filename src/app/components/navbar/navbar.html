<header class="main-header">
<nav class="navbar-container container">

    <a
    class="brand"
    routerLink="/inicio"
    (click)="closeMenu()"
    >
    <img
        class="brand-logo-img"
        src="logo-argenda-icon.svg"
        alt=""
    />
    <span class="brand-name">ARGENDA</span>
    </a>

    <button
    type="button"
    class="menu-button"
    aria-label="Abrir menú"
    [attr.aria-expanded]="menuOpen"
    (click)="toggleMenu()"
    >
    <span></span>
    <span></span>
    <span></span>
    </button>

    <div
    class="navbar-content"
    [class.navbar-content-open]="menuOpen"
    >
    <div class="navbar-links">

        <a
        routerLink="/inicio"
        fragment="funcionalidades"
        (click)="closeMenu()"
        >
        Funcionalidades
        </a>

        <a
        routerLink="/inicio"
        fragment="porque"
        (click)="closeMenu()"
        >
        ¿Por qué?
        </a>

        <a
        routerLink="/inicio"
        fragment="nosotros"
        (click)="closeMenu()"
        >
        Nosotros
        </a>

        <a
        routerLink="/inicio"
        fragment="contacto"
        (click)="closeMenu()"
        >
        Contacto
        </a>

        <span class="nav-divider" aria-hidden="true"></span>

        <a href="#" (click)="$event.preventDefault()">
        Blog
        </a>

        <a href="#" (click)="$event.preventDefault()">
        Tutoriales
        </a>

        <a
        routerLink="/inicio"
        fragment="faq"
        (click)="closeMenu()"
        >
        FAQ
        </a>

    </div>

    <div class="navbar-actions">

        @if (!authService.loggedIn()) {

        <a
            class="login-link"
            routerLink="/iniciar-sesion"
            (click)="closeMenu()"
        >
            Iniciar sesión
        </a>

        <a
            class="booking-button"
            routerLink="/registro"
            (click)="closeMenu()"
        >
            Crear cuenta gratis
        </a>

        } @else {

        <div class="profile-menu">

            <button
            type="button"
            class="profile-button"
            [attr.aria-expanded]="profileMenuOpen"
            (click)="toggleProfileMenu()"
            >
            <span>Hola, {{ userName }}</span>

            <span
                class="arrow"
                [class.arrow-open]="profileMenuOpen"
            >
                ▼
            </span>
            </button>

@if (profileMenuOpen) {
<div class="dropdown-menu-custom">

    <a
    routerLink="/agenda"
    (click)="closeProfileMenu()"
    >
    Mi agenda
    </a>

    <a
    routerLink="/mis-turnos"
    (click)="closeProfileMenu()"
    >
    Mis turnos
    </a>

    <button
    type="button"
    class="dropdown-logout"
    (click)="logout()"
    >
    Cerrar sesión
    </button>

</div>
}

        </div>

        <a
            class="booking-button"
            routerLink="/servicios"
            (click)="closeMenu()"
        >
            Reservar turno
        </a>

        }

    </div>
    </div>

</nav>
</header>
